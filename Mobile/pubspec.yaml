name: find_your_clinic
description: "Find Your Clinic - Healthcare mobile app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking
  dio: ^5.8.0+1

  # Routing
  go_router: ^15.1.2

  # Storage
  flutter_secure_storage: ^9.2.4

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Auth
  google_sign_in: ^6.2.2

  # Real-time
  signalr_netcore: ^1.3.7

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  file_picker: ^8.1.2

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf


flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: "assets/icons/splash_logo.png"
  image_dark: "assets/icons/splash_logo.png"
  
  android: true
  ios: true
  
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

  android_12:
    image: "assets/icons/splash_logo.png"
    image_dark: "assets/icons/splash_logo.png"
    color: "#FFFFFF"
    color_dark: "#000000"
